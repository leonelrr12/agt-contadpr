<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Contable</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Resumen</h2>
      </div>
      <div id="summary-content">
        <div class="summary-card">
          <span class="summary-label">Ventas hoy</span>
          <span class="summary-value" id="ventas-hoy">$0</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Gastos hoy</span>
          <span class="summary-value" id="gastos-hoy">$0</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Saldo Caja</span>
          <span class="summary-value" id="saldo-caja">$0</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Utilidad del Mes</span>
          <span class="summary-value" id="utilidad-mes">$0</span>
        </div>
      </div>
      <div class="sidebar-actions">
        <button onclick="toggleReports()" class="btn-outline">Ver Reportes</button>
      </div>
    </aside>

    <main id="main">
      <header id="chat-header">
        <h1>Agente Contable</h1>
        <p class="subtitle">¿Qué deseas registrar hoy?</p>
      </header>

      <div id="chat-messages"></div>

      <div id="input-area">
        <div id="quick-actions">
          <button class="quick-btn" onclick="showInput('escribir')">✏️ Escribir</button>
          <button class="quick-btn" onclick="showInput('factura')">📷 Factura</button>
          <button class="quick-btn" onclick="showInput('voz')">🎤 Hablar</button>
          <button class="quick-btn mobile-only" onclick="toggleReports()">📊 Reportes</button>
        </div>
        <div id="text-input" class="hidden">
          <textarea id="message-input" placeholder="Ej: Compré combustible por $40 con tarjeta..." rows="2"></textarea>
          <div style="display:flex;gap:6px">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
            <button class="btn-secondary" onclick="cancelInput()" style="padding:10px 16px;font-size:14px">✕</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h3>Confirmar Transacción</h3>
        <button onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button class="btn-primary" onclick="confirmTransaction()">✅ Confirmar</button>
        <button class="btn-secondary" onclick="editTransaction()">✏️ Editar</button>
        <button class="btn-danger" onclick="closeModal()">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="hidden" onclick="closeConfirm()"></div>
  <div id="confirm-dialog" class="hidden">
    <div id="confirm-body">
      <div id="confirm-icon">⚠️</div>
      <div id="confirm-msg"></div>
    </div>
    <div id="confirm-footer">
      <button class="btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button id="confirm-ok-btn" class="btn-danger">Sí, anular</button>
    </div>
  </div>

  <div id="reports-overlay" class="hidden" onclick="toggleReports()"></div>
  <div id="reports-panel">
    <div class="panel-header">
      <h2>Reportes Contables</h2>
      <button onclick="toggleReports()">✕</button>
    </div>
    <nav class="panel-tabs">
      <button class="active" data-panel="diario">Libro Diario</button>
      <button data-panel="balance">Balance</button>
      <button data-panel="resultados">Resultados</button>
    </nav>
    <div class="panel-body">
      <div id="panel-diario" class="panel-tab active">
        <div class="filter-bar">
          <input type="date" id="filter-diario-from">
          <input type="date" id="filter-diario-to">
          <button class="btn-filter" onclick="filterPanelDiario()">Filtrar</button>
          <button class="btn-filter" style="background:#6b7280" onclick="clearDiarioFilters()">Limpiar</button>
        </div>
        <div id="diario-content"></div>
        <div class="pagination" id="diario-pagination"></div>
      </div>
      <div id="panel-balance" class="panel-tab">
        <div class="filter-bar">
          <input type="date" id="filter-balance-from">
          <input type="date" id="filter-balance-to">
          <button class="btn-filter" onclick="loadPanelBalance()">Filtrar</button>
          <button class="btn-filter" style="background:#6b7280" onclick="clearBalanceFilters()">Limpiar</button>
        </div>
        <div id="balance-content"></div>
      </div>
      <div id="panel-resultados" class="panel-tab">
        <div class="filter-bar">
          <input type="date" id="filter-resultados-from">
          <input type="date" id="filter-resultados-to">
          <button class="btn-filter" onclick="loadPanelResultados()">Filtrar</button>
          <button class="btn-filter" style="background:#6b7280" onclick="clearResultadosFilters()">Limpiar</button>
        </div>
        <div id="resultados-content"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
