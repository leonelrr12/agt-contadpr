<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador507 — Contabilidad Inteligente</title>
  <meta name="description" content="Agente contable inteligente para Panamá. Registra transacciones, genera asientos contables, OCR de facturas y reportes financieros.">
  <meta name="theme-color" content="#1565c0">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Contador507 — Contabilidad Inteligente">
  <meta property="og:description" content="Agente contable impulsado por IA para Panamá. Registra transacciones, procesa facturas con OCR y genera reportes financieros automáticamente.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://contador507.com">
  <meta property="og:image" content="https://contador507.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="es_PA">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contador507 — Contabilidad Inteligente">
  <meta name="twitter:description" content="Agente contable con IA para Panamá. Facturas, asientos y reportes automatizados.">

  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Contador507</h2>
        <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menú">☰</button>
      </div>
      <div id="sidebar-user" style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:4px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700;color:#fff" id="sidebar-user-name">—</div>
          <button onclick="logout()" class="sidebar-logout-btn" style="width:auto;margin:0;padding:4px 10px;font-size:11px;white-space:nowrap">🚪</button>
        </div>
        <div style="font-size:14px;color:#94a3b8;margin-top:2px" id="sidebar-user-company">—</div>
      </div>
      <!-- Indicador de suscripción -->
      <div id="sidebar-subscription" style="display:none;padding:8px 14px;background:#f0f9ff;border-bottom:1px solid #bae6fd;margin-bottom:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:#0369a1" id="sub-plan-name"></span>
          <a href="/planes.html" style="font-size:11px;color:#0284c7;text-decoration:none;font-weight:600">Planes →</a>
        </div>
        <div style="background:#e0f2fe;border-radius:6px;height:6px;overflow:hidden;margin:4px 0">
          <div id="sub-progress-bar" style="background:#0284c7;height:100%;border-radius:6px;transition:width 0.3s;width:0%"></div>
        </div>
        <div style="font-size:10px;color:#0369a1;display:flex;justify-content:space-between">
          <span id="sub-usage-text"></span>
          <span id="sub-days-text"></span>
        </div>
      </div>
      <nav id="sidebar-nav">
        <button class="nav-link active" data-view="chat">💬 Chat</button>
        <a href="/informes.html" class="nav-link" style="display:block;text-decoration:none">📊 Informes</a>
        <div class="nav-section-label" id="admin-section-label" style="display:none">Administración</div>
        <button class="nav-link" data-view="panel-cuentas-admin" id="nav-cuentas-admin" style="display:none">🏦 Cuentas</button>
        <button class="nav-link" data-view="panel-conceptos-admin" id="nav-conceptos-admin" style="display:none">📝 Conceptos</button>
        <button class="nav-link" data-view="panel-config" id="nav-config" style="display:none">⚙️ Configuración</button>
      </nav>
    </aside>

    <main id="main">
      <header id="chat-header">
        <h1>Agente Contable</h1>
        <p class="subtitle">¿Qué deseas registrar hoy?</p>
      </header>

      <div id="chat-messages"></div>

      <div id="input-area">
        <div id="quick-actions">
          <button class="quick-btn" onclick="showInput('escribir')">✏️ Escribir</button>
          <button class="quick-btn" onclick="showInput('factura')">📷 Factura</button>
          <button class="quick-btn" onclick="showDGIMenu()">📄 DGI</button>
          <button class="quick-btn" onclick="showInput('voz')">🎤 Hablar</button>
          <button class="quick-btn mobile-only" onclick="toggleReports()">📊 Reportes</button>
        </div>
        <div id="dgi-menu" class="hidden" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <button class="quick-btn" onclick="showInput('pdf')" style="flex:1">📄 Subir PDF</button>
          <button class="quick-btn" onclick="showQRScanner()" style="flex:1">📷 Escanear QR</button>
          <button class="quick-btn" onclick="showQRInput()" style="flex:1">🔗 Pegar URL</button>
          <button class="btn-secondary" onclick="hideDGIMenu()" style="padding:10px 14px;font-size:16px">✕</button>
        </div>
        <div id="text-input" class="hidden">
          <textarea id="message-input" placeholder="Ej: Compré combustible por $40 con tarjeta..." rows="2"></textarea>
          <div style="display:flex;gap:6px">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
            <button class="btn-secondary" onclick="cancelInput()" style="padding:10px 16px;font-size:14px">✕</button>
          </div>
        </div>
        <div id="ocr-upload" class="hidden">
          <div id="ocr-capture-actions">
            <button class="quick-btn" onclick="openCamera()" style="flex:2">📸 Tomar foto</button>
            <button class="quick-btn" onclick="openGallery()" style="flex:2">🖼 Elegir de galería</button>
            <button class="btn-secondary" onclick="cancelOCR()" style="padding:10px 20px">✕</button>
          </div>
          <input type="file" id="ocr-camera-input" accept="image/*" capture="environment" hidden>
          <input type="file" id="ocr-gallery-input" accept="image/jpeg,image/png,image/webp" hidden>
          <div id="ocr-preview" class="hidden">
            <img id="ocr-preview-img">
          </div>
          <div id="ocr-loading" class="hidden">
            <div class="spinner"></div>
            <div id="ocr-status">Analizando factura con OCR...</div>
            <button class="btn-secondary" onclick="cancelOCR()" style="margin-top:12px;padding:10px 20px">✕ Cancelar</button>
          </div>
          <div id="ocr-result" class="hidden">
            <div id="ocr-result-text"></div>
            <div id="ocr-result-actions">
              <button class="btn-primary" onclick="sendOCRResult()">✅ Usar como transacción</button>
              <button class="btn-secondary" onclick="correctAndSendOCR()">✏️ Corregir y enviar</button>
              <button class="btn-secondary" onclick="cancelOCR()">✕ Cancelar</button>
            </div>
          </div>
        </div>
        <div id="pdf-upload" class="hidden">
          <div id="pdf-actions">
            <button class="quick-btn" onclick="openPDFPicker()" style="flex:2">📄 Seleccionar PDF</button>
            <button class="btn-secondary" onclick="cancelPDF()" style="padding:10px 20px">✕</button>
          </div>
          <input type="file" id="pdf-file-input" accept="application/pdf" hidden>
          <div id="pdf-loading" class="hidden">
            <div class="spinner"></div>
            <div id="pdf-status">Extrayendo datos del PDF...</div>
          </div>
          <div id="pdf-result" class="hidden">
            <div id="pdf-result-text"></div>
            <div id="pdf-result-actions">
              <button class="btn-primary" onclick="sendPDFResult()">✅ Usar como transacción</button>
              <button class="btn-secondary" onclick="cancelPDF()">✕ Cancelar</button>
            </div>
          </div>
        </div>
        <div id="qr-scanner" class="hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">
            <span style="font-size:13px;color:#6b7280">📷 Apunta el QR con la cámara</span>
            <button class="btn-secondary" onclick="stopQRScanner()" style="padding:6px 12px;font-size:12px">✕ Cancelar</button>
          </div>
          <div id="qr-reader" style="width:100%;max-width:400px;margin:0 auto;border-radius:8px;overflow:hidden"></div>
          <div id="qr-reader-status" style="text-align:center;font-size:13px;color:#6b7280;margin-top:6px">Esperando QR...</div>
        </div>
        <div id="qr-upload" class="hidden">
          <div id="qr-actions" style="display:flex;gap:6px;align-items:center">
            <input type="url" id="qr-url-input" placeholder="Pega la URL del PDF (desde QR)..." style="flex:1;padding:10px 12px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;font-family:inherit">
            <button class="btn-primary" onclick="processQRUrl()" style="white-space:nowrap">🔍 Procesar</button>
            <button class="btn-secondary" onclick="cancelQR()" style="padding:10px 14px">✕</button>
          </div>
          <div id="qr-loading" class="hidden">
            <div class="spinner"></div>
            <div id="qr-status">Descargando PDF desde URL...</div>
          </div>
          <div id="qr-result" class="hidden">
            <div id="qr-result-text"></div>
            <div id="qr-result-actions">
              <button class="btn-primary" onclick="sendQRResult()">✅ Usar como transacción</button>
              <button class="btn-secondary" onclick="cancelQR()">✕ Cancelar</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h3>Confirmar Transacción</h3>
        <button onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button class="btn-primary" onclick="confirmTransaction()">✅ Confirmar</button>
        <button class="btn-secondary" onclick="editTransaction()">✏️ Editar</button>
        <button class="btn-danger" onclick="closeModal()">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="hidden" onclick="closeConfirm()"></div>
  <div id="confirm-dialog" class="hidden">
    <div id="confirm-body">
      <div id="confirm-icon">⚠️</div>
      <div id="confirm-msg"></div>
    </div>
    <div id="confirm-footer">
      <button class="btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button id="confirm-ok-btn" class="btn-danger">Sí, anular</button>
    </div>
  </div>

  <div id="reports-overlay" class="hidden" onclick="toggleReports()"></div>
  <div id="reports-panel">
    <div class="panel-header hidden">
      <h2>Administración</h2>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js?v=15"></script>
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</body>
</html>
