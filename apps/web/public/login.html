<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador507 — Iniciar Sesión</title>
  <meta name="description" content="Inicia sesión en Contador507, el agente contable inteligente para Panamá.">
  <meta name="theme-color" content="#1565c0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .login-card h1 {
      font-size: 18px;
      color: #1a1a2e;
      margin-bottom: 4px;
      text-align: center;
    }
    .login-card .subtitle {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: none;
      border: 1px solid #d1d5db;
      color: #374151;
      margin-top: 10px;
    }
    .btn-outline:hover { background: #f9fafb; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .register-fields { display: none; }
    .register-fields.show { display: block; }
    #register-btn { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/logo.jpg" alt="Contador507" style="display:block;max-width:200px;height:auto;margin:0 auto 16px">
    <h1>Agente Contable</h1>
    <p class="subtitle">Contabilidad inteligente para Panamá</p>
    <div class="error-msg" id="error-msg"></div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@demo.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-submit-btn">Iniciar Sesión</button>
    </form>

    <button class="btn btn-outline" onclick="toggleRegister()" id="toggle-register-btn">Crear nueva empresa</button>

    <!-- Register Form -->
    <div class="register-fields" id="register-fields">
      <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0">
      <p style="font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:10px">Registrar nueva empresa</p>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Tu nombre</label>
          <input type="text" id="reg-name" placeholder="Juan Pérez" required autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="juan@empresa.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña (mín. 6 caracteres)</label>
          <input type="password" id="reg-password" placeholder="••••••" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Nombre de la empresa</label>
          <input type="text" id="reg-company" placeholder="Mi Negocio SA" required>
        </div>
        <div class="form-group">
          <label>RUC (opcional)</label>
          <input type="text" id="reg-taxid" placeholder="##-#####-##">
        </div>
        <button type="submit" class="btn" id="register-submit-btn">Crear Empresa y Comenzar</button>
      </form>
    </div>
  </div>

  <script>
    // Si ya tiene sesión activa, redirigir al chat
    if (localStorage.getItem('agt_token')) {
      window.location.href = '/';
    }

    const API_URL = window.location.origin + '/api';

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    function toggleRegister() {
      const fields = document.getElementById('register-fields');
      const btn = document.getElementById('toggle-register-btn');
      fields.classList.toggle('show');
      btn.textContent = fields.classList.contains('show') ? '← Volver al inicio de sesión' : 'Crear nueva empresa';
      hideError();
    }

    function saveAuth(data) {
      localStorage.setItem('agt_token', data.token);
      localStorage.setItem('agt_user', JSON.stringify(data.user));
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('login-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Iniciando sesión...';

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Error al iniciar sesión'); btn.disabled = false; btn.textContent = 'Iniciar Sesión'; return; }

        saveAuth(data);
        window.location.href = '/';
      } catch {
        showError('Error de conexión. Verifica que el servidor esté funcionando.');
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('register-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creando empresa...';

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            companyName: document.getElementById('reg-company').value,
            companyTaxId: document.getElementById('reg-taxid').value || undefined,
          }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Error al registrar'); btn.disabled = false; btn.textContent = 'Crear Empresa y Comenzar'; return; }

        saveAuth(data);
        window.location.href = '/';
      } catch {
        showError('Error de conexión. Verifica que el servidor esté funcionando.');
        btn.disabled = false;
        btn.textContent = 'Crear Empresa y Comenzar';
      }
    }
  </script>
</body>
</html>
