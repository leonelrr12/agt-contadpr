    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Calculator icon -->
  <rect x="80" y="100" width="160" height="200" rx="12" fill="#fff" opacity="0.15"/>
  <rect x="80" y="100" width="160" height="55" rx="12" fill="#fff" opacity="0.25"/>
  <text x="160" y="138" text-anchor="middle" font-size="36" font-weight="bold" fill="#fff" font-family="Arial">$</text>
  <rect x="100" y="170" width="50" height="25" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="170" y="170" width="50" height="25" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="100" y="205" width="50" height="25" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="170" y="205" width="50" height="25" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="100" y="240" width="50" height="25" rx="4" fill="#fff" opacity="0.4"/>
